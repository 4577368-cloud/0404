    <!-- Layout + Theme styles: plain CSS, no JS dependency -->
    <style>
        html, body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; }

        /* ── DESIGN.md + Tangbuy brand (全站) ── */
        :root {
            --tb-brand: #ee1d36;
            --tb-brand-hover: #c9142a;
            --tb-brand-light: #ff4d5e;
            --tb-brand-deep: #b01024;
            --tb-brand-tint: rgba(238, 29, 54, 0.12);
            --tb-text-ink: #080808;
            --tb-border-ui: #d8d8d8;
            --tb-accent-purple: #7a3dff;
            --tb-accent-pink: #ed52cb;
            --tb-accent-green: #00d722;
            --tb-accent-orange: #ff6b00;
            --tb-accent-yellow: #ffae13;
            --tb-shadow-cascade:
                rgba(0,0,0,0) 0 84px 24px,
                rgba(0,0,0,0.01) 0 54px 22px,
                rgba(0,0,0,0.04) 0 30px 18px,
                rgba(0,0,0,0.08) 0 13px 13px,
                rgba(0,0,0,0.09) 0 3px 7px;
        }

        /* ── Theme tokens (dark default) ── */
        :root {
            --theme-bg: #121212;
            --theme-bg-secondary: rgba(0,0,0,0.3);
            --theme-surface: rgba(255,255,255,0.05);
            --theme-surface-hover: rgba(255,255,255,0.1);
            --theme-border: rgba(255,255,255,0.14);
            --theme-text: #F5F5F7;
            --theme-text-secondary: #A1A1AA;
            --theme-text-muted: #71717A;
            --theme-input-bg: rgba(255,255,255,0.05);
            --theme-card-bg: linear-gradient(180deg, rgba(26,26,28,0.94) 0%, rgba(14,14,16,0.98) 100%);
            --theme-card-price-bg: #1a1a1a;
            --theme-bubble-ai: rgba(255,255,255,0.05);
            --theme-bubble-ai-text: #f3f4f6;
            --theme-input-bar-bg: rgba(10,10,12,0.82);
            --theme-glow-1: rgba(238, 29, 54, 0.09);
            --theme-glow-2: rgba(238, 29, 54, 0.05);
            --theme-dropdown-bg: #2A2A2A;
            --theme-modal-surface: #1e1e1e;
            --theme-chip-active-bg: rgba(255, 255, 255, 0.08);
            --brand-primary-fixed: var(--tb-brand);
            --brand-primary-hover-fixed: var(--tb-brand-hover);
            --brand-secondary-fixed: var(--tb-brand-light);
            --chip-seo: #c4b5fd;
            --chip-page: #fdba74;
            --theme-chat-bg: #1a1a1a;
        }
        [data-theme="light"] {
            --theme-bg: #FFFFFF;
            --theme-bg-secondary: #FFFFFF;
            --theme-surface: rgba(8, 8, 8, 0.04);
            --theme-surface-hover: rgba(8, 8, 8, 0.07);
            --theme-border: rgba(8, 8, 8, 0.12);
            --theme-text: #080808;
            --theme-text-secondary: #363636;
            --theme-text-muted: #5a5a5a;
            --theme-input-bg: rgba(8, 8, 8, 0.04);
            --theme-card-bg: #ffffff;
            --theme-card-price-bg: #f4f4f5;
            --theme-bubble-ai: #ffffff;
            --theme-bubble-ai-text: #27272a;
            --theme-input-bar-bg: rgba(255,255,255,0.92);
            --theme-glow-1: rgba(238, 29, 54, 0.08);
            --theme-glow-2: rgba(122, 61, 255, 0.06);
            --theme-dropdown-bg: #ffffff;
            --theme-modal-surface: #ffffff;
            --theme-chip-active-bg: rgba(8, 8, 8, 0.06);
            --chip-seo: #6d28d9;
            --chip-page: #c2410c;
            --theme-chat-bg: #ffffff;
        }

        /* Chat internals — still ID-based */
        #chat-root {
            flex: 1 1 0 !important;
            min-height: 0 !important;
            display: flex !important;
            flex-direction: column !important;
            overflow: hidden !important;
        }
        #chat-container {
            flex: 1 1 0 !important;
            min-height: 0 !important;
            overflow-y: auto !important;
            overflow-x: hidden !important;
        }
        #chat-input-bar {
            flex-shrink: 0 !important;
        }
        /* Pure white/dark background when in active conversation (not welcome portal) */
        .chat-active-bg {
            background: var(--theme-chat-bg, #ffffff) !important;
        }
        .chat-active-bg #chat-container {
            background: var(--theme-chat-bg, #ffffff) !important;
        }
    </style>


    <style type="text/tailwindcss">
        @layer theme {
            :root {
                --bg-dark: #121212;
                --primary: var(--tb-brand);
                --primary-hover: var(--tb-brand-hover);
                --secondary: var(--tb-brand-light);
                --accent: var(--tb-accent-orange);

                --text-main: #F5F5F7;
                --text-muted: #A1A1AA;

                --glass-bg: rgba(30, 30, 30, 0.4);
                --glass-border: rgba(255, 255, 255, 0.1);
                --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
                --glass-highlight: rgba(255, 255, 255, 0.05);
                --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 60%);
            }
            [data-theme="light"] {
                --primary: var(--tb-brand);
                --primary-hover: var(--tb-brand-hover);
                --secondary: var(--tb-brand-deep);
            }
        }

        @layer base {
            html, body, #root {
                height: 100%;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
            body {
                background-color: var(--theme-bg);
                background-image: radial-gradient(circle at 50% 0%, rgba(26, 26, 26, 0.9) 0%, var(--theme-bg) 100%);
                color: var(--theme-text);
                font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                transition: background-color 0.3s, color 0.3s;
            }
            [data-theme="light"] body {
                background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, var(--theme-bg) 100%);
            }
        }

        @layer components {
            .glass-panel {
                @apply backdrop-blur-2xl bg-[var(--glass-bg)] border border-[var(--glass-border)] shadow-[var(--glass-shadow)];
                box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            }
            
            .glass-card {
                @apply backdrop-blur-xl bg-white/5 border border-white/10 shadow-lg rounded-2xl transition-all duration-300 hover:shadow-2xl hover:bg-white/10 hover:border-white/20 hover:-translate-y-1 relative overflow-hidden;
            }
            
            .glass-card::before {
                content: '';
                @apply absolute inset-0 pointer-events-none opacity-0 transition-opacity duration-300;
                background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.05) 45%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 55%, transparent 60%);
            }
            
            .glass-card:hover::before {
                @apply opacity-100;
            }

            .glass-input {
                @apply backdrop-blur-lg bg-black/20 border border-white/10 text-[var(--text-main)] focus:bg-black/40 focus:border-[var(--primary)] focus:ring-1 focus:ring-[var(--primary)] outline-none transition-all duration-200 shadow-inner placeholder-gray-500 rounded-xl;
            }

            .btn-primary {
                @apply bg-[var(--primary)] text-white hover:bg-[var(--primary-hover)] transition-colors shadow-lg shadow-black/20 border border-white/5;
            }

            .btn-secondary {
                @apply bg-white/10 text-white hover:bg-white/20 transition-colors border border-white/10;
            }
            
            .text-gradient {
                @apply bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400;
            }
        }
        
        /* Custom Dark Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        [data-theme="light"] ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
        }
        [data-theme="light"] ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.25);
        }
        
        /* Animation Utilities */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .tb-wordmark {
            display: inline-flex;
            align-items: baseline;
            gap: 0.14em;
            font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif;
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 1.04;
            text-transform: none;
            text-rendering: optimizeLegibility;
        }

        .tb-wordmark__main {
            color: var(--theme-text);
            text-shadow: 0 1px 0 rgba(255,255,255,0.08), 0 8px 20px rgba(15,23,42,0.06);
        }

        .tb-wordmark__accent {
            background: linear-gradient(180deg, var(--tb-brand-light) 0%, var(--tb-brand) 45%, var(--tb-brand-hover) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
        }

        [data-theme="light"] .tb-wordmark__main {
            text-shadow: 0 1px 0 rgba(255,255,255,0.6), 0 10px 24px rgba(15,23,42,0.08);
        }

        /* ── Markdown Rendered Content ── */
        .md-body {
            font-size: 0.875rem;
            line-height: 1.75;
            color: #e4e4e7;
            word-break: break-word;
        }

        .md-body h1,
        .md-body h2,
        .md-body h3,
        .md-body h4,
        .md-body h5,
        .md-body h6 {
            font-weight: 700;
            line-height: 1.35;
            margin-top: 1.25em;
            margin-bottom: 0.5em;
        }
        .md-body h1 { font-size: 1.35rem; color: #ffffff; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.4em; }
        .md-body h2 { font-size: 1.15rem; color: #ffffff; }
        .md-body h3 { font-size: 1.05rem; color: var(--secondary); }
        .md-body h4 { font-size: 0.95rem; color: var(--accent); }
        .md-body h5,
        .md-body h6 { font-size: 0.875rem; color: #a1a1aa; }

        .md-body > *:first-child { margin-top: 0; }

        .md-body p {
            margin: 0.6em 0;
        }

        .md-body strong {
            color: #ffffff;
            font-weight: 700;
        }

        .md-body em {
            color: #d4d4d8;
            font-style: italic;
        }

        .md-body a {
            color: var(--secondary);
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: color 0.2s;
        }
        .md-body a:hover { color: var(--tb-brand-light); }

        .md-body ul,
        .md-body ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }
        .md-body ul { list-style-type: disc; }
        .md-body ol { list-style-type: decimal; }
        .md-body li {
            margin: 0.25em 0;
        }
        .md-body li::marker {
            color: var(--secondary);
        }

        .md-body code {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.8em;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 0.15em 0.4em;
            color: #f9a8d4;
        }

        .md-body pre {
            margin: 0.75em 0;
            padding: 1em;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 0.75rem;
            overflow-x: auto;
        }
        .md-body pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 0.8rem;
            color: #fecdd3;
            line-height: 1.6;
        }

        .md-body blockquote {
            margin: 0.75em 0;
            padding: 0.5em 1em;
            border-left: 3px solid var(--primary);
            background: color-mix(in srgb, var(--primary) 14%, transparent);
            border-radius: 0 0.5rem 0.5rem 0;
            color: #d4d4d8;
        }

        .md-body hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 1em 0;
        }

        .md-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 0.75em 0;
            font-size: 0.8rem;
        }
        .md-body thead th {
            text-align: left;
            padding: 0.5em 0.75em;
            background: rgba(255,255,255,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.15);
            color: #ffffff;
            font-weight: 600;
        }
        .md-body tbody td {
            padding: 0.5em 0.75em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .md-body tbody tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .md-body img {
            max-width: 100%;
            border-radius: 0.5rem;
        }

        /* Simple marquee animation for product banner */
        @keyframes tb-marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .tb-marquee {
            animation: tb-marquee 36s linear infinite;
        }

        /* ── Light theme: markdown overrides ── */
        [data-theme="light"] .md-body { color: #27272a; }
        [data-theme="light"] .md-body h1 { color: #18181b; border-bottom-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .md-body h2 { color: #18181b; }
        [data-theme="light"] .md-body h3 { color: var(--primary); }
        [data-theme="light"] .md-body h4 { color: #c2410c; }
        [data-theme="light"] .md-body h5,
        [data-theme="light"] .md-body h6 { color: #52525b; }
        [data-theme="light"] .md-body strong { color: #18181b; }
        [data-theme="light"] .md-body em { color: #3f3f46; }
        [data-theme="light"] .md-body a { color: var(--primary); }
        [data-theme="light"] .md-body a:hover { color: var(--primary-hover); }
        [data-theme="light"] .md-body code { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); color: #be185d; }
        [data-theme="light"] .md-body pre { background: #f4f4f5; border-color: rgba(0,0,0,0.08); }
        [data-theme="light"] .md-body pre code { color: #c2410c; }
        [data-theme="light"] .md-body blockquote { background: color-mix(in srgb, var(--primary) 10%, transparent); border-left-color: var(--primary); color: #3f3f46; }
        [data-theme="light"] .md-body thead th { background: rgba(0,0,0,0.04); border-bottom-color: rgba(0,0,0,0.15); color: #18181b; }
        [data-theme="light"] .md-body tbody td { border-bottom-color: rgba(0,0,0,0.06); }
        [data-theme="light"] .md-body tbody tr:hover { background: rgba(0,0,0,0.02); }
        [data-theme="light"] .md-body hr { border-top-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .md-body li::marker { color: var(--primary); }
    </style>
